<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COC KP Helper</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">CK</div>
          <div>
            <p class="eyebrow">Keeper Console</p>
            <h1>COC KP Helper</h1>
          </div>
        </div>

        <nav class="primary-nav">
          <button class="nav-item active" data-page="dashboard">概览</button>
          <button class="nav-item" data-page="campaigns">案件库</button>
          <button class="nav-item" data-page="workspace">案件工作台</button>
          <button class="nav-item" data-page="running">跑团模式</button>
          <button class="nav-item" data-page="handouts">线索道具库</button>
          <button class="nav-item" data-page="reference">规则速查</button>
        </nav>

        <section class="sidebar-card">
          <p class="eyebrow">Current Case</p>
          <h2 id="sidebar-campaign-title"></h2>
          <p id="sidebar-campaign-summary"></p>
          <div class="status-row">
            <span id="sidebar-open-clues" class="pill warning">开放线索 0</span>
            <span id="sidebar-open-threads" class="pill danger">未回收伏笔 0</span>
          </div>
        </section>

        <section class="sidebar-card muted">
          <p class="eyebrow">KP Prompt</p>
          <p>
            玩家突然怀疑法医在撒谎时，优先展示他的私人恐惧和遮掩理由，而不是直接抛出真相。
          </p>
        </section>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">First Version UI</p>
            <h2 id="page-title">概览</h2>
          </div>
          <div class="topbar-actions">
            <div class="search-box">
              <input id="global-search" type="search" placeholder="搜索 NPC、线索、地点、线索道具..." />
            </div>
            <button id="new-campaign-button" class="ghost-button">新建案件</button>
            <button id="export-button" class="ghost-button secondary">导出数据</button>
            <button id="import-button" class="ghost-button secondary">导入数据</button>
            <button id="reset-button" class="ghost-button secondary">恢复示例</button>
          </div>
        </header>

        <div id="feedback-banner" class="feedback-banner hidden"></div>

        <section id="page-dashboard" class="page active"></section>
        <section id="page-campaigns" class="page"></section>
        <section id="page-workspace" class="page"></section>
        <section id="page-running" class="page"></section>
        <section id="page-handouts" class="page"></section>
        <section id="page-reference" class="page"></section>
      </main>
    </div>

    <input id="import-file-input" type="file" accept="application/json" hidden />
    <script src="./src/app.js"></script>
  </body>
</html>
